<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Cheats — PS4/PS5 · Xbox</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ─── CSS VARIABLES ────────────────────────────────────────────────────────── */
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #13131e;
  --card-hover: #17172a;
  --border: #1c1c30;
  --border-strong: #2a2a44;
  --accent: #ff6b00;
  --accent2: #ffd000;
  --text: #e8e8f2;
  --muted: #555570;
  --muted2: #888899;
  --tag-bg: #1a1a2e;
  --toast-bg: #1c1c2e;
  --glow: rgba(255,107,0,0.12);
  --transition: 0.2s ease;
}
:root.light {
  --bg: #eeeef5;
  --surface: #e0e0ec;
  --card: #f8f8ff;
  --card-hover: #ffffff;
  --border: #cccce0;
  --border-strong: #b0b0cc;
  --accent: #d95500;
  --accent2: #b08000;
  --text: #181828;
  --muted: #9090aa;
  --muted2: #666680;
  --tag-bg: #e0e0f0;
  --toast-bg: #2a2a3e;
  --glow: rgba(255,107,0,0.08);
}

/* ─── RESET ────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ─── BODY ─────────────────────────────────────────────────────────────────── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* grid texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,107,0,0.025) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,107,0,0.025) 40px);
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ───────────────────────────────────────────────────────────────── */
header {
  position: relative;
  padding: 48px 24px 32px;
  text-align: center;
  z-index: 1;
}

.header-glow {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 200px;
  background: radial-gradient(ellipse at center top, rgba(255,107,0,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.header-actions {
  position: absolute;
  top: 50%;
  right: 20px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
  align-items: center;
}

.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted2);
  width: 34px;
  height: 34px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: all var(--transition);
  line-height: 1;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 9vw, 80px);
  letter-spacing: 6px;
  background: linear-gradient(135deg, #ff6b00 0%, #ffaa00 50%, #ffd000 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 6px;
}

.header-badges {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 12px;
}

.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  padding: 4px 12px;
  border-radius: 3px;
}
.badge-ps   { background: rgba(0,70,255,0.15); border: 1px solid rgba(0,70,255,0.35); color: #5588ff; }
.badge-xbox { background: rgba(16,124,16,0.15); border: 1px solid rgba(16,124,16,0.35); color: #4ec44e; }
.badge-ver  { background: rgba(255,107,0,0.12); border: 1px solid rgba(255,107,0,0.35); color: var(--accent); }

.header-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin-top: 28px;
  opacity: 0.5;
}

/* ─── PLATFORM SWITCHER ─────────────────────────────────────────────────────── */
.platform-bar {
  max-width: 960px;
  margin: 24px auto 0;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  z-index: 1;
  position: relative;
}

.platform-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 20px;
  border-radius: 4px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 7px;
}
.platform-btn:first-child { border-radius: 4px 0 0 4px; }
.platform-btn:last-child  { border-radius: 0 4px 4px 0; }
.platform-btn.active.ps   { background: rgba(0,70,255,0.18); border-color: rgba(0,70,255,0.5); color: #5588ff; }
.platform-btn.active.xbox { background: rgba(16,124,16,0.2);  border-color: rgba(16,124,16,0.5); color: #4ec44e; }
.platform-btn:not(.active):hover { border-color: var(--border-strong); color: var(--text); }

/* ─── CONTROLS BAR ──────────────────────────────────────────────────────────── */
.controls {
  max-width: 960px;
  margin: 20px auto 0;
  padding: 0 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  position: relative;
  z-index: 2;
}

.search-wrap {
  flex: 1;
  min-width: 220px;
  position: relative;
}
.search-wrap .s-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.search-clear {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 4px;
  display: none;
  transition: color var(--transition);
}
.search-clear:hover { color: var(--accent); }
.search-clear.visible { display: block; }

#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 11px 36px 11px 40px;
  border-radius: 6px;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
#search:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--glow); }
#search::placeholder { color: var(--muted); }

.ctrl-actions {
  display: flex;
  gap: 6px;
}

.action-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.accent { border-color: rgba(255,107,0,0.4); color: var(--accent); background: rgba(255,107,0,0.08); }
.action-btn.accent:hover { background: rgba(255,107,0,0.16); }

/* ─── FILTER BAR ────────────────────────────────────────────────────────────── */
.filter-bar {
  max-width: 960px;
  margin: 12px auto 0;
  padding: 0 16px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  position: relative;
  z-index: 1;
}

.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 5px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-btn .cat-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  background: var(--tag-bg);
  padding: 1px 5px;
  border-radius: 2px;
  color: var(--muted);
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn:hover .cat-count { background: rgba(255,107,0,0.1); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
.filter-btn.active .cat-count { background: rgba(0,0,0,0.2); color: #000; }

/* ─── STATUS BAR ────────────────────────────────────────────────────────────── */
.status-bar {
  max-width: 960px;
  margin: 14px auto 0;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}

.count-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}
.count-info strong { color: var(--accent); font-weight: 700; }

.view-sort {
  display: flex;
  gap: 6px;
}

.vs-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted2);
  width: 30px;
  height: 30px;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all var(--transition);
}
.vs-btn:hover, .vs-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,107,0,0.08); }

/* ─── FAVORITES SECTION ─────────────────────────────────────────────────────── */
.fav-section {
  max-width: 960px;
  margin: 28px auto 0;
  padding: 0 16px;
  display: none;
  position: relative;
  z-index: 1;
}
.fav-section.has-favs { display: block; }

.fav-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.fav-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--accent2);
}
.fav-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}
.fav-actions {
  margin-left: auto;
  display: flex;
  gap: 6px;
}
.fav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 10px;
  margin-bottom: 8px;
}
.fav-divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(255,208,0,0.25), transparent);
  margin: 24px 0 0;
}

/* ─── MAIN GRID ─────────────────────────────────────────────────────────────── */
.grid-wrap {
  max-width: 960px;
  margin: 20px auto 80px;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 12px;
}
.grid.list-view {
  grid-template-columns: 1fr;
  gap: 7px;
}

/* ─── CARD ──────────────────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition), transform 0.15s ease, box-shadow var(--transition), background var(--transition);
  cursor: default;
  animation: fadeIn 0.35s ease both;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--accent);
  opacity: 0;
  transition: opacity var(--transition);
}
.card:hover {
  background: var(--card-hover);
  border-color: rgba(255,107,0,0.35);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,107,0,0.06);
}
.card:hover::before { opacity: 1; }
.card.is-fav { border-color: rgba(255,208,0,0.28); }
.card.is-fav::before { background: var(--accent2); opacity: 1; }

.card-actions {
  position: absolute;
  top: 14px; right: 14px;
  display: flex;
  gap: 5px;
  align-items: center;
}

.fav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  width: 26px; height: 26px;
  border-radius: 5px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  padding: 0;
}
.fav-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.fav-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,208,0,0.1); }

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  padding: 4px 9px;
  border-radius: 4px;
  cursor: pointer;
  transition: all var(--transition);
  text-transform: uppercase;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: #44cc88; color: #44cc88; background: rgba(68,204,136,0.08); }

.card-category {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.card-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 14px;
  padding-right: 80px;
}
.card-code {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

/* ─── LIST VIEW CARD ────────────────────────────────────────────────────────── */
.list-view .card {
  padding: 12px 18px;
  display: grid;
  grid-template-columns: 100px 1fr auto;
  align-items: center;
  gap: 16px;
}
.list-view .card::before { height: 3px; width: 100%; top: 0; left: 0; }
.list-view .card-actions { position: static; }
.list-view .card-category { margin-bottom: 0; }
.list-view .card-name { margin-bottom: 0; padding-right: 0; font-size: 15px; }
.list-view .card-code-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.list-view .card-code { gap: 3px; }
.list-view .card-left { display: flex; flex-direction: column; gap: 3px; }

/* ─── BUTTON PILLS ──────────────────────────────────────────────────────────── */
.btn-pill {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  font-weight: 700;
  white-space: nowrap;
  transition: all var(--transition);
}

/* PS colors */
.btn-cross    { background: rgba(30,144,255,0.15); color: #5599ff; border: 1px solid rgba(30,144,255,0.28); }
.btn-circle   { background: rgba(255,60,60,0.15);  color: #ff6868; border: 1px solid rgba(255,60,60,0.28); }
.btn-square   { background: rgba(255,100,180,0.15);color: #ff75c5; border: 1px solid rgba(255,100,180,0.28); }
.btn-triangle { background: rgba(50,200,100,0.15); color: #55d585; border: 1px solid rgba(50,200,100,0.28); }
.btn-r1, .btn-r2 { background: rgba(255,190,0,0.12); color: #ffcc00; border: 1px solid rgba(255,190,0,0.25); }
.btn-l1, .btn-l2 { background: rgba(190,140,255,0.12); color: #cc99ff; border: 1px solid rgba(190,140,255,0.25); }
.btn-dir      { background: rgba(255,255,255,0.07); color: #aaaacc; border: 1px solid rgba(255,255,255,0.1); }

/* Xbox colors */
.xbox .btn-a  { background: rgba(0,220,80,0.15); color: #33ee77; border: 1px solid rgba(0,220,80,0.28); }
.xbox .btn-b  { background: rgba(220,30,30,0.15); color: #ee5555; border: 1px solid rgba(220,30,30,0.28); }
.xbox .btn-x  { background: rgba(30,144,255,0.15); color: #5599ff; border: 1px solid rgba(30,144,255,0.28); }
.xbox .btn-y  { background: rgba(220,190,0,0.15); color: #eecc00; border: 1px solid rgba(220,190,0,0.28); }
.xbox .btn-rb, .xbox .btn-rt { background: rgba(255,190,0,0.12); color: #ffcc00; border: 1px solid rgba(255,190,0,0.25); }
.xbox .btn-lb, .xbox .btn-lt { background: rgba(190,140,255,0.12); color: #cc99ff; border: 1px solid rgba(190,140,255,0.25); }
.xbox .btn-dir { background: rgba(255,255,255,0.07); color: #aaaacc; border: 1px solid rgba(255,255,255,0.1); }

/* ─── MARK ──────────────────────────────────────────────────────────────────── */
mark {
  background: rgba(255,208,0,0.28);
  color: var(--accent2);
  border-radius: 2px;
  padding: 0 2px;
}

/* ─── NO RESULTS ────────────────────────────────────────────────────────────── */
.no-results {
  display: none;
  text-align: center;
  padding: 80px 20px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  font-size: 13px;
  grid-column: 1 / -1;
}
.no-results strong {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  color: var(--border-strong);
  letter-spacing: 4px;
  margin-bottom: 8px;
}

/* ─── TOAST ─────────────────────────────────────────────────────────────────── */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
  pointer-events: none;
}
.toast {
  background: var(--toast-bg);
  border: 1px solid var(--border-strong);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.5px;
  padding: 10px 16px;
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: toastIn 0.25s ease both;
  pointer-events: none;
  max-width: 300px;
}
.toast.remove { animation: toastOut 0.3s ease both; }
.toast-icon { font-size: 14px; }
.toast.type-success { border-color: rgba(68,204,136,0.4); }
.toast.type-success .toast-icon { color: #44cc88; }
.toast.type-info    { border-color: rgba(85,153,255,0.4); }
.toast.type-info    .toast-icon { color: #5599ff; }
.toast.type-accent  { border-color: rgba(255,107,0,0.4); }
.toast.type-accent  .toast-icon { color: var(--accent); }

/* ─── SCROLL TO TOP ─────────────────────────────────────────────────────────── */
#scrollTop {
  position: fixed;
  bottom: 24px;
  left: 24px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--muted2);
  width: 40px;
  height: 40px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 999;
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: all 0.25s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
#scrollTop.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
#scrollTop:hover { border-color: var(--accent); color: var(--accent); }

/* ─── FOOTER ────────────────────────────────────────────────────────────────── */
footer {
  text-align: center;
  padding: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
}
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* ─── KEYBOARD SHORTCUT HINT ────────────────────────────────────────────────── */
.kbd-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
}
kbd {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted2);
}

/* ─── ANIMATIONS ────────────────────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(20px); }
}

/* generate Xbox code from PS code */
function psToXbox(psCode) {
  const map = {
    'x': 'A', 'cross': 'A',
    'circle': 'B',
    'square': 'X',
    'triangle': 'Y',
    'l1': 'LB', 'l2': 'LT',
    'r1': 'RB', 'r2': 'RT',
  };
  return psCode.split(',').map(p => {
    const t = p.trim().toLowerCase();
    return map[t] ? ' ' + map[t] : p;
  }).join(',');
}

═══════════════════════════════════════════════════════════════════ */
const PS_CLASS = {
  'x':'btn-cross','cross':'btn-cross','circle':'btn-circle',
  'square':'btn-square','triangle':'btn-triangle',
  'r1':'btn-r1','r2':'btn-r2','l1':'btn-l1','l2':'btn-l2',
};
const XBOX_CLASS = {
  'a':'btn-a','b':'btn-b','x':'btn-x','y':'btn-y',
  'rb':'btn-rb','rt':'btn-rt','lb':'btn-lb','lt':'btn-lt',
};
const PS_LABEL = {
  'x':'✕','cross':'✕','circle':'○','square':'□','triangle':'△',
  'up':'↑','down':'↓','left':'←','right':'→',
  'r1':'R1','r2':'R2','l1':'L1','l2':'L2',
};
const XBOX_LABEL = {
  'a':'A','b':'B','x':'X','y':'Y',
  'rb':'RB','rt':'RT','lb':'LB','lt':'LT',
  'up':'↑','down':'↓','left':'←','right':'→',
};

function getBtnClass(b) {
  b = b.trim().toLowerCase();
  if (currentPlatform === 'ps') return PS_CLASS[b] || 'btn-dir';
  return XBOX_CLASS[b] || 'btn-dir';
}
function getBtnLabel(b) {
  b = b.trim().toLowerCase();
  if (currentPlatform === 'ps') return PS_LABEL[b] || b.toUpperCase();
  return XBOX_LABEL[b] || b.toUpperCase();
}
function parseCode(code) {
  return code.split(',').map(p => {
    p = p.trim();
    return `<span class="btn-pill ${getBtnClass(p)}">${getBtnLabel(p)}</span>`;
  }).join('');
}

/* ════════════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════════ */
function toast(msg, type = 'success', icon = '✓') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast type-${type}`;
  el.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('remove');
    setTimeout(() => el.remove(), 320);
  }, 2200);
}

/* ════════════════════════════════════════════════════════════════════
   HIGHLIGHT
═══════════════════════════════════════════════════════════════════ */
function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

        <div class="card-code ${currentPlatform === 'xbox' ? 'xbox' : ''}">${parseCode(code)}</div>
      </div>
      <div class="card-actions">
        <button class="fav-btn ${isFav ? 'active' : ''}" data-name="${ch.name}" title="Favorite">★</button>
        <button class="copy-btn" data-code="${code}">COPY</button>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div class="card-actions">
        <button class="fav-btn ${isFav ? 'active' : ''}" data-name="${ch.name}" title="Favorite">★</button>
        <button class="copy-btn" data-code="${code}">COPY</button>
      </div>
      <div class="card-category">${ch.cat}</div>
      <div class="card-name">${highlight(ch.name, query)}</div>
      <div class="card-code ${currentPlatform === 'xbox' ? 'xbox' : ''}">${parseCode(code)}</div>
    `;
  }

  card.querySelector('.copy-btn').addEventListener('click', e => {
    const btn = e.currentTarget;
    navigator.clipboard.writeText(btn.dataset.code).then(() => {
      btn.textContent = 'COPIED';
      btn.classList.add('copied');
      toast(`Copied: <strong>${ch.name}</strong>`, 'success', '📋');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1600);
    });
  });

  card.querySelector('.fav-btn').addEventListener('click', e => {
    const name = e.currentTarget.dataset.name;
    if (favorites.has(name)) {
      favorites.delete(name);
      toast(`Removed from favorites`, 'info', '☆');
    } else {
      favorites.add(name);
      toast(`Added to favorites`, 'accent', '★');
    }
    saveFavs();
    renderFavs();
    applyFilters();
  });

  return card;
}

/* ════════════════════════════════════════════════════════════════════
   RENDER FAVS
═══════════════════════════════════════════════════════════════════ */
function renderFavs() {
  const section = document.getElementById('favSection');
  const grid    = document.getElementById('favGrid');
  const countEl = document.getElementById('favCount');
  grid.innerHTML = '';

  if (favorites.size === 0) {
    section.classList.remove('has-favs');
    return;
  }
  section.classList.add('has-favs');
  countEl.textContent = `${favorites.size} saved`;

  CHEATS.filter(c => favorites.has(c.name)).forEach(ch => {
    const card = buildCard(ch, '');
    card.style.animation = 'none';
    grid.appendChild(card);
  });
}

/* ════════════════════════════════════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════════════════════════════════ */
function renderCards(list, query) {
  const grid    = document.getElementById('grid');
  const noRes   = document.getElementById('noResults');
  const countEl = document.getElementById('countNum');

  [...grid.querySelectorAll('.card')].forEach(c => c.remove());
  countEl.textContent = list.length;

  if (list.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  list.forEach((ch, i) => {
    const card = buildCard(ch, query);
    card.style.animationDelay = `${Math.min(i * 18, 180)}ms`;
    grid.insertBefore(card, noRes);
  });
}

/* ════════════════════════════════════════════════════════════════════
   APPLY FILTERS
═══════════════════════════════════════════════════════════════════ */
function applyFilters() {
  let list = [...CHEATS];
  if (currentCat !== 'all') list = list.filter(c => c.cat === currentCat);
  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.ps.toLowerCase().includes(q) ||
      c.cat.toLowerCase().includes(q)
    );
  }
  if (sortAZ) list.sort((a, b) => a.name.localeCompare(b.name));
  renderCards(list, currentQuery);
}

/* ════════════════════════════════════════════════════════════════════
   CATEGORY COUNTS
═══════════════════════════════════════════════════════════════════ */
function updateCatCounts() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const count = cat === 'all' ? CHEATS.length : CHEATS.filter(c => c.cat === cat).length;
    let span = btn.querySelector('.cat-count');
    if (!span) {
      span = document.createElement('span');
      span.className = 'cat-count';
      btn.appendChild(span);
    }
    span.textContent = count;
  });
}

/* ════════════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════════ */

// Search
const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('searchClear');
searchEl.addEventListener('input', e => {
  currentQuery = e.target.value.trim();
  clearBtn.classList.toggle('visible', currentQuery.length > 0);
  applyFilters();
});
clearBtn.addEventListener('click', () => {
  searchEl.value = '';
  currentQuery = '';
  clearBtn.classList.remove('visible');
  searchEl.focus();
  applyFilters();
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    applyFilters();
  });
});

// Platform
document.querySelectorAll('.platform-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPlatform = btn.dataset.platform;
    const isPlatformPS = currentPlatform === 'ps';
    toast(`Switched to ${isPlatformPS ? 'PlayStation' : 'Xbox'} layout`, 'info', isPlatformPS ? '🎮' : '🟢');
    renderFavs();
    applyFilters();
  });
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', () => {
  document.documentElement.classList.toggle('light');
  const isLight = document.documentElement.classList.contains('light');
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
});

// Sort
document.getElementById('sortBtn').addEventListener('click', () => {
  sortAZ = !sortAZ;
  document.getElementById('sortBtn').classList.toggle('active', sortAZ);
  document.getElementById('sortBtn').textContent = sortAZ ? 'Z↓' : 'A↓';
  applyFilters();
});

// View toggle
document.getElementById('gridViewBtn').addEventListener('click', () => {
  listView = false;
  document.getElementById('grid').classList.remove('list-view');
  document.getElementById('gridViewBtn').classList.add('active');
  document.getElementById('listViewBtn').classList.remove('active');
  applyFilters();
});
document.getElementById('listViewBtn').addEventListener('click', () => {
  listView = true;
  document.getElementById('grid').classList.add('list-view');
  document.getElementById('listViewBtn').classList.add('active');
  document.getElementById('gridViewBtn').classList.remove('active');
  applyFilters();
});

// Random cheat
document.getElementById('randomBtn').addEventListener('click', () => {
  const random = CHEATS[Math.floor(Math.random() * CHEATS.length)];
  searchEl.value = random.name;
  currentQuery = random.name;
  clearBtn.classList.add('visible');
  // reset cat filter
  currentCat = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
  applyFilters();
  toast(`Random: <strong>${random.name}</strong>`, 'accent', '🎲');
});

// Export favs
document.getElementById('exportBtn').addEventListener('click', () => {
  if (favorites.size === 0) {
    toast('No favorites saved yet — star some cheats first!', 'info', '★');
    return;
  }
  const lines = CHEATS
    .filter(c => favorites.has(c.name))
    .map(c => `${c.name}\n  PS:   ${c.ps}\n  Xbox: ${c.xbox}`);
  const text = `GTA San Andreas — Saved Cheats\n${'═'.repeat(40)}\n\n${lines.join('\n\n')}`;
  navigator.clipboard.writeText(text).then(() => {
    toast(`${favorites.size} cheat${favorites.size > 1 ? 's' : ''} copied to clipboard!`, 'success', '📤');
  });
});

// Clear favs
document.getElementById('clearFavsBtn').addEventListener('click', () => {
  favorites.clear();
  saveFavs();
  renderFavs();
  applyFilters();
  toast('Favorites cleared', 'info', '🗑');
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
    searchEl.select();
  }
  if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.value = '';
    currentQuery = '';
    clearBtn.classList.remove('visible');
    searchEl.blur();
    applyFilters();
  }
});

// Scroll to top
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* ════════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════ */
updateCatCounts();
renderFavs();
applyFilters();
</script>
</body>
</html>
