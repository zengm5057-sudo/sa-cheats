<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Cheats — GTA San Andreas</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── VARIABLES ── */
:root {
  --bg:           #070709;
  --surface:      #0d0d12;
  --card:         #0f0f15;
  --card-hover:   #141420;
  --border:       #1a1a26;
  --border-hi:    #252535;
  --accent:       #f0522a;
  --accent2:      #fbbf24;
  --accent3:      #34d399;
  --text:         #dddde8;
  --muted:        #46465c;
  --muted2:       #7878a0;
  --tag-bg:       #14141f;
  --glow:         rgba(240,82,42,0.14);
  --glow2:        rgba(240,82,42,0.06);
  --tr:           0.18s ease;
}
:root.light {
  --bg:           #f0eff5;
  --surface:      #e4e3ef;
  --card:         #fafafe;
  --card-hover:   #ffffff;
  --border:       #d0cfdf;
  --border-hi:    #b8b7cc;
  --accent:       #d43a16;
  --accent2:      #b07d10;
  --accent3:      #16a37a;
  --text:         #14141e;
  --muted:        #9898b4;
  --muted2:       #606078;
  --tag-bg:       #e0dfed;
  --glow:         rgba(240,82,42,0.1);
  --glow2:        rgba(240,82,42,0.04);
}

/* ─── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

/* ─── BODY ── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--tr), color var(--tr);
}

/* Noise texture overlay */
body::before {
  content:'';
  position:fixed;inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;opacity:0.55;
}

/* Diagonal stripe texture */
body::after {
  content:'';
  position:fixed;inset:0;
  background: repeating-linear-gradient(
    -55deg,
    transparent,
    transparent 24px,
    rgba(240,82,42,0.018) 24px,
    rgba(240,82,42,0.018) 25px
  );
  pointer-events:none;z-index:0;
}

/* ─── HEADER ── */
header {
  position:relative;
  padding: 52px 24px 36px;
  text-align:center;
  z-index:1;
  overflow:hidden;
}

.header-orb {
  position:absolute;
  top:-80px;left:50%;
  transform:translateX(-50%);
  width:700px;height:340px;
  background: radial-gradient(ellipse at 50% 30%, rgba(240,82,42,0.18) 0%, rgba(240,82,42,0.04) 45%, transparent 70%);
  pointer-events:none;
}

.header-stripe {
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent2) 60%, transparent 100%);
  opacity: 0.8;
}

.header-actions {
  position:absolute;
  top:20px;right:20px;
  display:flex;gap:7px;align-items:center;
  z-index:2;
}

.icon-btn {
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted2);
  width:32px;height:32px;
  border-radius:4px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  transition:all var(--tr);
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

.logo-wrap {
  display:inline-block;
  position:relative;
}
.logo {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(52px, 11vw, 96px);
  letter-spacing: -1px;
  line-height: 0.92;
  color: var(--text);
  position: relative;
}
.logo span.accent-word {
  color: var(--accent);
  position:relative;
}
/* underline slash accent */
.logo span.accent-word::after {
  content:'';
  position:absolute;
  bottom:-4px;left:0;right:0;
  height:4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:2px;
}

.subtitle {
  font-family:'Fira Code', monospace;
  font-size:10px;
  color:var(--muted);
  letter-spacing:5px;
  text-transform:uppercase;
  margin-top:14px;
}

.header-badges {
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  margin-top:14px;
}
.badge {
  font-family:'Fira Code',monospace;
  font-size:9px;
  letter-spacing:1.5px;
  padding:4px 11px;
  border-radius:2px;
  text-transform:uppercase;
}
.badge-ps   {background:rgba(0,80,255,0.12);border:1px solid rgba(0,80,255,0.3);color:#6699ff;}
.badge-xbox {background:rgba(16,200,16,0.1);border:1px solid rgba(16,200,16,0.3);color:#4dcc4d;}
.badge-ver  {background:rgba(240,82,42,0.1);border:1px solid rgba(240,82,42,0.3);color:var(--accent);}

.header-divider {
  height:1px;
  background:linear-gradient(90deg,transparent,var(--accent) 35%,var(--accent2) 65%,transparent);
  margin-top:30px;opacity:0.35;
}

/* ─── PLATFORM BAR ── */
.platform-bar {
  max-width:980px;
  margin:28px auto 0;
  padding:0 16px;
  display:flex;align-items:center;justify-content:center;gap:0;
  z-index:1;position:relative;
}
.platform-btn {
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted2);
  font-family:'Fira Code',monospace;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  padding:9px 22px;
  cursor:pointer;
  transition:all var(--tr);
  display:flex;align-items:center;gap:8px;
}
.platform-btn:first-child{border-radius:3px 0 0 3px;}
.platform-btn:last-child {border-radius:0 3px 3px 0;}
.platform-btn.active.ps   {background:rgba(0,80,255,0.16);border-color:rgba(0,80,255,0.45);color:#6699ff;}
.platform-btn.active.xbox {background:rgba(16,200,16,0.14);border-color:rgba(16,200,16,0.45);color:#4dcc4d;}
.platform-btn:not(.active):hover{border-color:var(--border-hi);color:var(--text);}

/* ─── CONTROLS ── */
.controls {
  max-width:980px;
  margin:18px auto 0;
  padding:0 16px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  position:relative;z-index:2;
}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap .s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:14px;line-height:1;padding:4px;display:none;transition:color var(--tr);
}
.search-clear:hover{color:var(--accent);}
.search-clear.visible{display:block;}

#search {
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Fira Code',monospace;
  font-size:12px;
  padding:11px 36px 11px 40px;
  border-radius:3px;
  outline:none;
  transition:border-color var(--tr),box-shadow var(--tr);
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow);}
#search::placeholder{color:var(--muted);}

.ctrl-actions{display:flex;gap:6px;align-items:center;}
.action-btn {
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted2);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:8px 14px;border-radius:3px;cursor:pointer;
  transition:all var(--tr);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.accent{border-color:rgba(240,82,42,0.4);color:var(--accent);background:rgba(240,82,42,0.08);}
.action-btn.accent:hover{background:rgba(240,82,42,0.16);}

/* ─── FILTER BAR ── */
.filter-bar {
  max-width:980px;
  margin:10px auto 0;
  padding:0 16px;
  display:flex;gap:5px;flex-wrap:wrap;align-items:center;
  position:relative;z-index:1;
}
.filter-btn {
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--muted2);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 13px;border-radius:3px;cursor:pointer;
  transition:all var(--tr);
  display:flex;align-items:center;gap:6px;
}
.filter-btn .cat-count {
  font-family:'Fira Code',monospace;font-size:8px;
  background:var(--tag-bg);padding:1px 5px;border-radius:2px;color:var(--muted);
}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn:hover .cat-count{background:rgba(240,82,42,0.1);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.filter-btn.active .cat-count{background:rgba(0,0,0,0.25);color:rgba(255,255,255,0.8);}

/* ─── STATUS BAR ── */
.status-bar {
  max-width:980px;
  margin:12px auto 0;
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1;
}
.count-info {
  font-family:'Fira Code',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;
}
.count-info strong{color:var(--accent);font-weight:500;}
.view-sort{display:flex;gap:5px;}
.vs-btn {
  background:var(--surface);border:1px solid var(--border);color:var(--muted2);
  width:28px;height:28px;border-radius:3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all var(--tr);
}
.vs-btn:hover,.vs-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,82,42,0.08);}

/* ─── FAVORITES ── */
.fav-section {
  max-width:980px;margin:28px auto 0;padding:0 16px;
  display:none;position:relative;z-index:1;
}
.fav-section.has-favs{display:block;}
.fav-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.fav-title {
  font-family:'Black Han Sans',sans-serif;
  font-size:18px;letter-spacing:2px;color:var(--accent2);
}
.fav-meta{font-family:'Fira Code',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.fav-actions{margin-left:auto;display:flex;gap:5px;}
.fav-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px;
  margin-bottom:8px;
}
.fav-divider {
  height:1px;
  background:linear-gradient(90deg,rgba(251,191,36,0.22),transparent);
  margin:24px 0 0;
}

/* ─── MAIN GRID ── */
.grid-wrap {
  max-width:980px;margin:18px auto 100px;padding:0 16px;
  position:relative;z-index:1;
}
.grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px;
}
.grid.list-view{grid-template-columns:1fr;gap:6px;}

/* ─── CARD ── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:4px;
  padding:18px 18px 16px;
  position:relative;overflow:hidden;
  transition:border-color var(--tr),transform 0.14s ease,box-shadow var(--tr),background var(--tr);
  cursor:default;
  animation:fadeIn 0.32s ease both;
}
/* accent corner tag */
.card::before {
  content:'';
  position:absolute;top:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 24px 24px 0;
  border-color:transparent var(--border) transparent transparent;
  transition:border-color var(--tr);
}
/* left accent bar */
.card::after {
  content:'';
  position:absolute;top:0;left:0;
  width:3px;height:100%;
  background:var(--accent);
  opacity:0;
  transition:opacity var(--tr);
  border-radius:0 0 0 4px;
}
.card:hover {
  background:var(--card-hover);
  border-color:rgba(240,82,42,0.3);
  transform:translateY(-2px);
  box-shadow:0 10px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(240,82,42,0.06),0 0 20px rgba(240,82,42,0.04);
}
.card:hover::before{border-color:transparent rgba(240,82,42,0.4) transparent transparent;}
.card:hover::after{opacity:1;}
.card.is-fav{border-color:rgba(251,191,36,0.24);}
.card.is-fav::after{background:var(--accent2);opacity:1;}
.card.is-fav::before{border-color:transparent rgba(251,191,36,0.35) transparent transparent;}

.card-actions {
  position:absolute;top:13px;right:13px;
  display:flex;gap:5px;align-items:center;
}
.fav-btn {
  background:none;border:1px solid var(--border);color:var(--muted);
  font-size:12px;width:25px;height:25px;border-radius:3px;cursor:pointer;
  transition:all var(--tr);display:flex;align-items:center;justify-content:center;
  line-height:1;padding:0;
}
.fav-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.fav-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(251,191,36,0.1);}

.copy-btn {
  background:none;border:1px solid var(--border);color:var(--muted);
  font-family:'Fira Code',monospace;font-size:8px;letter-spacing:1px;
  padding:4px 8px;border-radius:3px;cursor:pointer;
  transition:all var(--tr);text-transform:uppercase;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{border-color:var(--accent3);color:var(--accent3);background:rgba(52,211,153,0.08);}

.card-category {
  font-family:'Fira Code',monospace;font-size:8px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted);margin-bottom:7px;
}
.card-name {
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;
  color:var(--text);line-height:1.2;margin-bottom:14px;padding-right:84px;
  letter-spacing:0.5px;
}
.card-code{display:flex;flex-wrap:wrap;gap:3px;}

/* ─── LIST VIEW ── */
.list-view .card{
  padding:11px 16px;
  display:grid;grid-template-columns:90px 1fr auto;
  align-items:center;gap:16px;
}
.list-view .card::after{height:3px;width:100%;top:0;left:0;border-radius:0;}
.list-view .card-actions{position:static;}
.list-view .card-category{margin-bottom:0;}
.list-view .card-name{margin-bottom:0;padding-right:0;font-size:15px;}
.list-view .card-code-wrap{display:flex;align-items:center;gap:12px;}
.list-view .card-code{gap:3px;}
.list-view .card-left{display:flex;flex-direction:column;gap:2px;}

/* ─── BUTTON PILLS ── */
.btn-pill {
  display:inline-flex;align-items:center;
  padding:2px 7px;border-radius:3px;
  font-family:'Fira Code',monospace;font-size:9px;font-weight:500;
  letter-spacing:0.3px;white-space:nowrap;
  transition:all var(--tr);
}
/* PS */
.btn-cross    {background:rgba(40,130,255,0.13);color:#6699ff;border:1px solid rgba(40,130,255,0.25);}
.btn-circle   {background:rgba(255,55,55,0.13); color:#ff7070;border:1px solid rgba(255,55,55,0.25);}
.btn-square   {background:rgba(255,90,190,0.13);color:#ff80cc;border:1px solid rgba(255,90,190,0.25);}
.btn-triangle {background:rgba(40,210,100,0.13);color:#50d888;border:1px solid rgba(40,210,100,0.25);}
.btn-r1,.btn-r2{background:rgba(240,180,0,0.11);color:#f0b800;border:1px solid rgba(240,180,0,0.22);}
.btn-l1,.btn-l2{background:rgba(180,120,255,0.11);color:#c080ff;border:1px solid rgba(180,120,255,0.22);}
.btn-dir      {background:rgba(255,255,255,0.06);color:#a0a0c0;border:1px solid rgba(255,255,255,0.1);}
/* Xbox */
.xbox .btn-a {background:rgba(0,220,80,0.13); color:#30ee70;border:1px solid rgba(0,220,80,0.25);}
.xbox .btn-b {background:rgba(220,30,30,0.13); color:#ee5050;border:1px solid rgba(220,30,30,0.25);}
.xbox .btn-x {background:rgba(40,130,255,0.13);color:#6699ff;border:1px solid rgba(40,130,255,0.25);}
.xbox .btn-y {background:rgba(220,190,0,0.13); color:#eedd00;border:1px solid rgba(220,190,0,0.25);}
.xbox .btn-rb,.xbox .btn-rt{background:rgba(240,180,0,0.11);color:#f0b800;border:1px solid rgba(240,180,0,0.22);}
.xbox .btn-lb,.xbox .btn-lt{background:rgba(180,120,255,0.11);color:#c080ff;border:1px solid rgba(180,120,255,0.22);}
.xbox .btn-dir{background:rgba(255,255,255,0.06);color:#a0a0c0;border:1px solid rgba(255,255,255,0.1);}

mark{background:rgba(251,191,36,0.24);color:var(--accent2);border-radius:2px;padding:0 2px;}

/* ─── NO RESULTS ── */
.no-results{
  display:none;text-align:center;padding:80px 20px;
  font-family:'Fira Code',monospace;color:var(--muted);font-size:12px;
  grid-column:1/-1;
}
.no-results strong{
  display:block;
  font-family:'Black Han Sans',sans-serif;
  font-size:52px;color:var(--border-hi);
  letter-spacing:6px;margin-bottom:10px;
}

/* ─── TOAST ── */
#toast-container{
  position:fixed;bottom:24px;right:24px;
  display:flex;flex-direction:column;gap:7px;
  z-index:9999;pointer-events:none;
}
.toast{
  background:var(--surface);
  border:1px solid var(--border-hi);
  color:var(--text);
  font-family:'Fira Code',monospace;font-size:11px;letter-spacing:0.3px;
  padding:10px 15px;border-radius:3px;
  box-shadow:0 8px 28px rgba(0,0,0,0.55);
  display:flex;align-items:center;gap:8px;
  animation:toastIn 0.22s ease both;pointer-events:none;max-width:290px;
}
.toast.remove{animation:toastOut 0.28s ease both;}
.toast-icon{font-size:13px;}
.toast.type-success{border-color:rgba(52,211,153,0.38);}
.toast.type-success .toast-icon{color:var(--accent3);}
.toast.type-info   {border-color:rgba(66,153,255,0.38);}
.toast.type-info   .toast-icon{color:#6699ff;}
.toast.type-accent {border-color:rgba(240,82,42,0.38);}
.toast.type-accent .toast-icon{color:var(--accent);}

/* ─── SCROLL TOP ── */
#scrollTop{
  position:fixed;bottom:24px;left:24px;
  background:var(--surface);border:1px solid var(--border-hi);color:var(--muted2);
  width:38px;height:38px;border-radius:3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  z-index:999;opacity:0;transform:translateY(10px);pointer-events:none;
  transition:all 0.22s ease;box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
#scrollTop.visible{opacity:1;transform:translateY(0);pointer-events:all;}
#scrollTop:hover{border-color:var(--accent);color:var(--accent);}

/* ─── FOOTER ── */
footer{
  text-align:center;padding:24px;
  font-family:'Fira Code',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;
  position:relative;z-index:1;
  border-top:1px solid var(--border);
}
footer a{color:var(--accent);text-decoration:none;}
footer a:hover{text-decoration:underline;}

/* ─── KBD HINT ── */
.kbd-hint{
  font-family:'Fira Code',monospace;font-size:9px;color:var(--muted);
  letter-spacing:0.5px;margin-left:auto;display:flex;align-items:center;gap:4px;
}
kbd{
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:2px;padding:1px 5px;
  font-family:'Fira Code',monospace;font-size:8px;color:var(--muted2);
}

/* ─── ANIMATIONS ── */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px);}
  to  {opacity:1;transform:translateY(0);}
}
@keyframes toastIn{
  from{opacity:0;transform:translateX(16px);}
  to  {opacity:1;transform:translateX(0);}
}
@keyframes toastOut{
  from{opacity:1;transform:translateX(0);}
  to  {opacity:0;transform:translateX(16px);}
}

/* ─── RESPONSIVE ── */
@media(max-width:600px){
  .grid,.fav-grid{grid-template-columns:1fr;}
  .header-actions{display:none;}
  .kbd-hint{display:none;}
  .list-view .card{grid-template-columns:1fr;}
  .list-view .card-code-wrap{flex-direction:column;align-items:flex-start;}
  #toast-container{bottom:14px;right:14px;}
}

  const map = {'x':'A','cross':'A','circle':'B','square':'X','triangle':'Y','l1':'LB','l2':'LT','r1':'RB','r2':'RT'};

  'x':'btn-cross','cross':'btn-cross','circle':'btn-circle',
  'square':'btn-square','triangle':'btn-triangle',
  'r1':'btn-r1','r2':'btn-r2','l1':'btn-l1','l2':'btn-l2',
};
const XBOX_CLASS = {
  'a':'btn-a','b':'btn-b','x':'btn-x','y':'btn-y',
  'rb':'btn-rb','rt':'btn-rt','lb':'btn-lb','lt':'btn-lt',
};
const PS_LABEL = {
  'x':'✕','cross':'✕','circle':'○','square':'□','triangle':'△',
  'up':'↑','down':'↓','left':'←','right':'→',
  'r1':'R1','r2':'R2','l1':'L1','l2':'L2',
};
const XBOX_LABEL = {
  'a':'A','b':'B','x':'X','y':'Y',
  'rb':'RB','rt':'RT','lb':'LB','lt':'LT',
  'up':'↑','down':'↓','left':'←','right':'→',
};
function getBtnClass(b) {
  b = b.trim().toLowerCase();
  return currentPlatform === 'ps' ? (PS_CLASS[b] || 'btn-dir') : (XBOX_CLASS[b] || 'btn-dir');
}
function getBtnLabel(b) {
  b = b.trim().toLowerCase();
  return currentPlatform === 'ps' ? (PS_LABEL[b] || b.toUpperCase()) : (XBOX_LABEL[b] || b.toUpperCase());
}
function parseCode(code) {
  return code.split(',').map(p => {
    p = p.trim();
    return `<span class="btn-pill ${getBtnClass(p)}">${getBtnLabel(p)}</span>`;
  }).join('');
}

/* ════ TOAST ════ */
function toast(msg, type = 'success', icon = '✓') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast type-${type}`;
  el.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('remove');
    setTimeout(() => el.remove(), 300);
  }, 2200);
}

/* ════ HIGHLIGHT ════ */
function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

/* ════ BUILD CARD ════ */
function buildCard(ch, query) {
  const card = document.createElement('div');
  const isFav = favorites.has(ch.name);
  const code = currentPlatform === 'ps' ? ch.ps : ch.xbox;
  card.className = 'card' + (isFav ? ' is-fav' : '');

  if (listView) {
    card.innerHTML = `
      <div class="card-left">
        <div class="card-category">${ch.cat}</div>
        <div class="card-name">${highlight(ch.name, query)}</div>
      </div>
      <div class="card-code-wrap">
        <div class="card-code ${currentPlatform === 'xbox' ? 'xbox' : ''}">${parseCode(code)}</div>
      </div>
      <div class="card-actions">
        <button class="fav-btn ${isFav ? 'active' : ''}" data-name="${ch.name}" title="Favorite">★</button>
        <button class="copy-btn" data-code="${code}">COPY</button>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div class="card-actions">
        <button class="fav-btn ${isFav ? 'active' : ''}" data-name="${ch.name}" title="Favorite">★</button>
        <button class="copy-btn" data-code="${code}">COPY</button>
      </div>
      <div class="card-category">${ch.cat}</div>
      <div class="card-name">${highlight(ch.name, query)}</div>
      <div class="card-code ${currentPlatform === 'xbox' ? 'xbox' : ''}">${parseCode(code)}</div>
    `;
  }

  card.querySelector('.copy-btn').addEventListener('click', e => {
    const btn = e.currentTarget;
    navigator.clipboard.writeText(btn.dataset.code).then(() => {
      btn.textContent = 'COPIED';
      btn.classList.add('copied');
      toast(`Copied: <strong>${ch.name}</strong>`, 'success', '📋');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1600);
    });
  });

  card.querySelector('.fav-btn').addEventListener('click', e => {
    const name = e.currentTarget.dataset.name;
    if (favorites.has(name)) {
      favorites.delete(name);
      toast('Removed from favorites', 'info', '☆');
    } else {
      favorites.add(name);
      toast('Added to favorites', 'accent', '★');
    }
    saveFavs(); renderFavs(); applyFilters();
  });

  return card;
}

  section.classList.add('has-favs');
  countEl.textContent = `${favorites.size} saved`;
  CHEATS.filter(c => favorites.has(c.name)).forEach(ch => {
    const card = buildCard(ch, '');
    card.style.animation = 'none';
    grid.appendChild(card);
  });
}

/* ════ RENDER CARDS ════ */
function renderCards(list, query) {
  const grid    = document.getElementById('grid');
  const noRes   = document.getElementById('noResults');
  const countEl = document.getElementById('countNum');
  [...grid.querySelectorAll('.card')].forEach(c => c.remove());
  countEl.textContent = list.length;
  if (list.length === 0) { noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  list.forEach((ch, i) => {
    const card = buildCard(ch, query);
    card.style.animationDelay = `${Math.min(i * 16, 160)}ms`;
    grid.insertBefore(card, noRes);
  });
}

/* ════ FILTERS ════ */
function applyFilters() {
  let list = [...CHEATS];
  if (currentCat !== 'all') list = list.filter(c => c.cat === currentCat);
  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.ps.toLowerCase().includes(q) ||
      c.cat.toLowerCase().includes(q)
    );
  }
  if (sortAZ) list.sort((a, b) => a.name.localeCompare(b.name));
  renderCards(list, currentQuery);
}

function updateCatCounts() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const count = cat === 'all' ? CHEATS.length : CHEATS.filter(c => c.cat === cat).length;
    let span = btn.querySelector('.cat-count');
    if (!span) { span = document.createElement('span'); span.className = 'cat-count'; btn.appendChild(span); }
    span.textContent = count;
  });
}

/* ════ EVENTS ════ */
const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('searchClear');
searchEl.addEventListener('input', e => {
  currentQuery = e.target.value.trim();
  clearBtn.classList.toggle('visible', currentQuery.length > 0);
  applyFilters();
});
clearBtn.addEventListener('click', () => {
  searchEl.value = ''; currentQuery = '';
  clearBtn.classList.remove('visible');
  searchEl.focus(); applyFilters();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    applyFilters();
  });
});

document.querySelectorAll('.platform-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPlatform = btn.dataset.platform;
    const isPS = currentPlatform === 'ps';
    toast(`Switched to ${isPS ? 'PlayStation' : 'Xbox'} layout`, 'info', isPS ? '🎮' : '🟢');
    renderFavs(); applyFilters();
  });
});

document.getElementById('themeToggle').addEventListener('click', () => {
  document.documentElement.classList.toggle('light');
  document.getElementById('themeToggle').textContent =
    document.documentElement.classList.contains('light') ? '☀️' : '🌙';
});

document.getElementById('sortBtn').addEventListener('click', () => {
  sortAZ = !sortAZ;
  document.getElementById('sortBtn').classList.toggle('active', sortAZ);
  document.getElementById('sortBtn').textContent = sortAZ ? 'Z↓' : 'A↓';
  applyFilters();
});

document.getElementById('gridViewBtn').addEventListener('click', () => {
  listView = false;
  document.getElementById('grid').classList.remove('list-view');
  document.getElementById('gridViewBtn').classList.add('active');
  document.getElementById('listViewBtn').classList.remove('active');
  applyFilters();
});
document.getElementById('listViewBtn').addEventListener('click', () => {
  listView = true;
  document.getElementById('grid').classList.add('list-view');
  document.getElementById('listViewBtn').classList.add('active');
  document.getElementById('gridViewBtn').classList.remove('active');
  applyFilters();
});

document.getElementById('randomBtn').addEventListener('click', () => {
  const random = CHEATS[Math.floor(Math.random() * CHEATS.length)];
  searchEl.value = random.name;
  currentQuery = random.name;
  clearBtn.classList.add('visible');
  currentCat = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
  applyFilters();
  toast(`Random: <strong>${random.name}</strong>`, 'accent', '🎲');
});

document.getElementById('exportBtn').addEventListener('click', () => {
  if (favorites.size === 0) { toast('Star some cheats first!', 'info', '★'); return; }
  const lines = CHEATS
    .filter(c => favorites.has(c.name))
    .map(c => `${c.name}\n  PS:   ${c.ps}\n  Xbox: ${c.xbox}`);
  const text = `GTA San Andreas — Saved Cheats\n${'═'.repeat(40)}\n\n${lines.join('\n\n')}`;
  navigator.clipboard.writeText(text).then(() => {
    toast(`${favorites.size} cheat${favorites.size > 1 ? 's' : ''} copied!`, 'success', '📤');
  });
});

document.getElementById('clearFavsBtn').addEventListener('click', () => {
  favorites.clear(); saveFavs(); renderFavs(); applyFilters();
  toast('Favorites cleared', 'info', '🗑');
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault(); searchEl.focus(); searchEl.select();
  }
  if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.value = ''; currentQuery = '';
    clearBtn.classList.remove('visible');
    searchEl.blur(); applyFilters();
  }
});

const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollTopBtn.addEventListener('click', () => { window.scrollTo({ top:0, behavior:'smooth' }); });

/* ════ INIT ════ */
updateCatCounts();
renderFavs();
applyFilters();
</script>
</body>
</html>
